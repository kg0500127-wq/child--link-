version: '3.9'

services:
  # ── PHP App ──
  app:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: childlink_app
    ports:
      - "8080:80"
    volumes:
      - ../public:/var/www/html
      - ../app:/var/app
      - ../config:/var/config
      - ../.env:/var/.env
    depends_on:
      db:
        condition: service_healthy
    environment:
      - DB_HOST=db
      - DB_PORT=3306
    restart: unless-stopped

  # ── MySQL ──
  db:
    image: mysql:8.0
    container_name: childlink_db
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: childlink
      MYSQL_USER: childlink_user
      MYSQL_PASSWORD: childlink_pass
    volumes:
      - db_data:/var/lib/mysql
      - ../database/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ── phpMyAdmin ──
  phpmyadmin:
    image: phpmyadmin:latest
    container_name: childlink_pma
    ports:
      - "8081:80"
    environment:
      PMA_HOST: db
      PMA_USER: root
      PMA_PASSWORD: root
    depends_on:
      - db
    restart: unless-stopped

volumes:
  db_data:
