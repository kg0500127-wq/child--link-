* { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --gold:   #f5c842;
  --green:  #00e676;
  --green2: #69f0ae;

}

<!-- Canvas BG -->
<script>
const C=document.getElementById('bg'),ctx=C.getContext('2d');
let W,H;
function resize(){W=C.width=innerWidth;H=C.height=innerHeight;}
resize(); window.addEventListener('resize',resize);
const HS=34,HH=HS*Math.sqrt(3),HW=HS*2;
let hexes=[];
function buildGrid(){
  hexes=[];
  const cols=Math.ceil(W/(HW*.75))+2,rows=Math.ceil(H/HH)+2;
  for(let c=-1;c<cols;c++) for(let r=-1;r<rows;r++)
    hexes.push({x:c*HW*.75,y:r*HH+(c%2===0?0:HH/2),
      phase:Math.random()*Math.PI*2,speed:.003+Math.random()*.004,kind:Math.random()});
}
buildGrid(); window.addEventListener('resize',buildGrid);
function hexPath(x,y,s){
  ctx.beginPath();
  for(let i=0;i<6;i++){const a=Math.PI/180*(60*i-30);
    i===0?ctx.moveTo(x+s*Math.cos(a),y+s*Math.sin(a)):ctx.lineTo(x+s*Math.cos(a),y+s*Math.sin(a));}
  ctx.closePath();
}
const pts=Array.from({length:65},()=>({
  x:Math.random()*innerWidth,y:Math.random()*innerHeight,
  vx:(Math.random()-.5)*.45,vy:(Math.random()-.5)*.45,
  r:Math.random()*1.7+.4,alpha:Math.random()*.5+.15,
  col:Math.random()>.65?'#00e676':Math.random()>.5?'#f5c842':'#ffffff'
}));
let scanY=-80;
function draw(){
  ctx.clearRect(0,0,W,H);
  ctx.fillStyle='#040d06';ctx.fillRect(0,0,W,H);
  const glow=(cx,cy,r,col)=>{const g=ctx.createRadialGradient(cx,cy,0,cx,cy,r);g.addColorStop(0,col);g.addColorStop(1,'transparent');ctx.fillStyle=g;ctx.beginPath();ctx.arc(cx,cy,r,0,Math.PI*2);ctx.fill();};
  glow(W*.2,H*.3,340,'rgba(0,160,80,0.07)');
  glow(W*.8,H*.7,300,'rgba(0,100,60,0.05)');
  glow(W*.5,H*.5,180,'rgba(245,200,66,0.03)');
  const t=Date.now();
  hexes.forEach(h=>{
    const p=Math.sin(t*h.speed+h.phase);
    let a,col,sc;
    if(h.kind>.95){a=.05+p*.04;col=`rgba(245,200,66,${a})`;sc=`rgba(245,200,66,${a*1.8})`;}
    else if(h.kind>.88){a=.04+p*.04;col=`rgba(0,230,118,${a})`;sc=`rgba(0,230,118,${a*1.8})`;}
    else if(h.kind>.76){a=.02+p*.015;col=`rgba(0,180,90,${a})`;sc=`rgba(0,180,90,${a*1.5})`;}
    else{a=.008+p*.005;col=`rgba(0,120,60,${a})`;sc=`rgba(0,120,60,${a*1.2})`;}
    hexPath(h.x,h.y,HS-1.5);
    ctx.fillStyle=col;ctx.fill();
    ctx.strokeStyle=sc;ctx.lineWidth=.5;ctx.stroke();
  });
  pts.forEach(p=>{
    p.x+=p.vx;p.y+=p.vy;
    if(p.x<0)p.x=W;if(p.x>W)p.x=0;if(p.y<0)p.y=H;if(p.y>H)p.y=0;
    ctx.globalAlpha=p.alpha*(0.7+0.3*Math.sin(t*.0012+p.x));
    ctx.fillStyle=p.col;ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);ctx.fill();
  });
  ctx.globalAlpha=1;
  scanY+=.6;if(scanY>H+80)scanY=-80;
  const sg=ctx.createLinearGradient(0,scanY-45,0,scanY+45);
  sg.addColorStop(0,'rgba(0,230,118,0)');sg.addColorStop(.5,'rgba(0,230,118,0.04)');sg.addColorStop(1,'rgba(0,230,118,0)');
  ctx.fillStyle=sg;ctx.fillRect(0,scanY-45,W,90);
  ctx.strokeStyle='rgba(0,230,118,0.10)';ctx.lineWidth=1;
  ctx.beginPath();ctx.moveTo(0,scanY);ctx.lineTo(W,scanY);ctx.stroke();
  requestAnimationFrame(draw);
}
draw();
</script>

<script>
window.selectedType   = null;
window.selectedFormat = null;

window.selectType = function(btn){
  document.querySelectorAll('.type-btn').forEach(b => b.className = 'type-btn');
  window.selectedType = btn.dataset.type;
  btn.classList.add(
    window.selectedType === 'missing_children' ? 'active-missing' :
    window.selectedType === 'found_children'   ? 'active-found'   : 'active-all'
  );
  checkReady();
};

window.selectFormat = function(btn){
  document.querySelectorAll('.fmt-btn').forEach(b => b.className = 'fmt-btn');
  btn.classList.add('active');
  window.selectedFormat = btn.dataset.fmt;
  checkReady();
};

function checkReady(){
  document.getElementById('exportBtn').disabled = !(window.selectedType && window.selectedFormat);
}
</script>

function showStatus(msg, type){

  s.textContent = msg; s.className = 'status show ' + type;
}
function disableAll(v){
  document.querySelectorAll('.type-btn,.fmt-btn,#exportBtn').forEach(b => b.disabled = v);
}
function formatDate(val){
  if(!val) return '';
  if(typeof val.toDate === 'function')
    return val.toDate().toLocaleDateString('ar-EG',{year:'numeric',month:'2-digit',day:'2-digit'});
  return String(val);
}

// ══════════════════════════════════════════════════════════════
// تحميل الصورة عبر fetch → blob URL
// هذه الطريقة تتجاوز مشكلة CORS مع Firebase Storage
// لأن fetch بيطلب الـ CORS headers بشكل صريح
// ══════════════════════════════════════════════════════════════
async function imgToBase64(url) {
  if (!url) return null;
  try {
    // الطريقة الأولى: fetch مباشر (يشتغل لو Firebase Storage معمول عليه CORS صح)
    const resp = await fetch(url, { mode: 'cors' });
    if (!resp.ok) throw new Error('fetch failed');
    const blob = await resp.blob();
    return await new Promise((res, rej) => {
      const reader = new FileReader();
      reader.onload  = () => res(reader.result);
      reader.onerror = () => rej(new Error('FileReader failed'));
      reader.readAsDataURL(blob);
    });
  } catch (e1) {
    // الطريقة الثانية: Image element (fallback)
    return await new Promise(resolve => {
      const img = new Image();
      img.crossOrigin = 'anonymous';
      img.onload = () => {
        try {
          const c = document.createElement('canvas');
          c.width = img.naturalWidth; c.height = img.naturalHeight;
          c.getContext('2d').drawImage(img, 0, 0);
          resolve(c.toDataURL('image/jpeg', 0.85));
        } catch { resolve(null); }
      };
      img.onerror = () => resolve(null);
      img.src = url + (url.includes('?') ? '&' : '?') + '_cb=' + Date.now();
    });
  }
}

// ══════════════════════════════════════════════════════════════
// تحميل كل الصور مسبقاً مع progress indicator
// ══════════════════════════════════════════════════════════════
async function preloadImages(rows) {
  const map = {};
  const urlKey = 'رابط الصورة';
  const urls = [...new Set(rows.map(r => r[urlKey]).filter(Boolean))];
  if (!urls.length) return map;

  let loaded = 0;
  showStatus(`⏳ جاري تحميل الصور (0/${urls.length})...`, 'loading');

  await Promise.all(urls.map(async url => {
    map[url] = await imgToBase64(url);
    loaded++;
    showStatus(`⏳ جاري تحميل الصور (${loaded}/${urls.length})...`, 'loading');
  }));

  const success = Object.values(map).filter(Boolean).length;
  showStatus(`✅ تم تحميل ${success} من ${urls.length} صورة`, 'loading');
  return map;
}

async function fetchCol(name) {
  const snap = await getDocs(collection(db, name));
  return snap.docs.map(doc => {
    const d = doc.data();
    const createdAt = formatDate(d.created_at);
    if (name === 'missing_children')
      return {
        'المعرف': doc.id, 'الاسم': d.name||'', 'العمر': d.age||'',
        'الجنس': d.gender||'', 'لون البشرة': d.skin||'', 'المنطقة': d.area||'',
        'الحي': d.region||'', 'الوصف': d.description||'', 'ولي الأمر': d.guardian||'',
        'رقم الهاتف': d.phone||'', 'الإيميل': d.email||'', 'آخر ظهور': d.last_seen||'',
        'تاريخ الفقدان': d.lost_at||'', 'تاريخ الإبلاغ': createdAt, 'رابط الصورة': d.image_url||''
      };
    return {
      'المعرف': doc.id, 'الاسم': d.name||'', 'العمر': d.age||'',
      'الجنس': d.gender||'', 'المنطقة': d.area||'', 'الحي': d.region||'',
      'الوصف': d.description||'', 'مع من الطفل': d.child_with||'',
      'مكان الاكتشاف': d.found_location||'', 'الحالة الصحية': d.health||'',
      'رقم الهاتف': d.phone||'', 'المُبلِّغ': d.reporter||'',
      'تاريخ الاكتشاف': d.found_at||'', 'تاريخ الإبلاغ': createdAt, 'رابط الصورة': d.image_url||''
    };
  });
}

// ══════════════════════════════════════════════════════════════
// EXCEL — عمود "الصورة" بـ hyperlink قابل للضغط
// نغير اسم الهيدر من "رابط الصورة" إلى "الصورة"
// ونكتب النص كـ "🖼 فتح الصورة" مع رابط مباشر
// ══════════════════════════════════════════════════════════════
function toExcel(rows, sheetName, fileName) {
  if (!rows.length) return;

  // نعمل نسخة من الـ keys مع تغيير "رابط الصورة" → "الصورة"
  const origKeys = Object.keys(rows[0]);
  const displayKeys = origKeys.map(k => k === 'رابط الصورة' ? 'الصورة' : k);
  const urlOrigIdx  = origKeys.indexOf('رابط الصورة');

  // نبني صفوف البيانات بالـ keys الجديدة
  const displayRows = rows.map(r => {
    const obj = {};
    origKeys.forEach((k, i) => {
      const dk = displayKeys[i];
      obj[dk] = (k === 'رابط الصورة') ? '' : (r[k] || '');
    });
    return obj;
  });

  const ws = XLSX.utils.json_to_sheet(displayRows, { header: displayKeys });

  // نضيف hyperlink + نص جميل على خلايا عمود الصورة
  if (urlOrigIdx >= 0) {
    rows.forEach((row, i) => {
      const url = row['رابط الصورة'];
      const cellAddr = XLSX.utils.encode_cell({ r: i + 1, c: urlOrigIdx });
      if (!ws[cellAddr]) ws[cellAddr] = { t: 's' };
      if (url) {
        ws[cellAddr].v = '🖼 فتح الصورة';
        ws[cellAddr].t = 's';
        ws[cellAddr].l = { Target: url, Tooltip: 'اضغط لفتح الصورة' };
        // تنسيق نص أزرق تحته خط
        ws[cellAddr].s = {
          font: { color: { rgb: '0563C1' }, underline: true, bold: false },
          alignment: { horizontal: 'center', vertical: 'center' }
        };
      } else {
        ws[cellAddr].v = '—';
        ws[cellAddr].t = 's';
        ws[cellAddr].s = { alignment: { horizontal: 'center', vertical: 'center' }, font: { color: { rgb: '999999' } } };
      }
    });
  }

  // تنسيق هيدر الجدول — لون أخضر غامق
  const hdrStyle = {
    fill: { fgColor: { rgb: '1a6b2a' } },
    font: { color: { rgb: 'FFFFFF' }, bold: true, sz: 11 },
    alignment: { horizontal: 'center', vertical: 'center', wrapText: true },
    border: { bottom: { style: 'thin', color: { rgb: '4caf50' } } }
  };
  displayKeys.forEach((k, ci) => {
    const addr = XLSX.utils.encode_cell({ r: 0, c: ci });
    if (ws[addr]) ws[addr].s = hdrStyle;
  });

  // تنسيق الصفوف — تظليل متناوب
  rows.forEach((row, ri) => {
    const bg = ri % 2 === 0 ? 'FFFFFF' : 'f0fff4';
    displayKeys.forEach((k, ci) => {
      const addr = XLSX.utils.encode_cell({ r: ri + 1, c: ci });
      if (!ws[addr]) ws[addr] = { t: 's', v: '' };
      if (!ws[addr].s) ws[addr].s = {};
      if (!ws[addr].s.fill) ws[addr].s.fill = { fgColor: { rgb: bg } };
      if (!ws[addr].s.alignment) ws[addr].s.alignment = { vertical: 'center', wrapText: true, readingOrder: 2 };
      if (!ws[addr].s.border) ws[addr].s.border = {
        top: { style: 'thin', color: { rgb: 'cccccc' } },
        bottom: { style: 'thin', color: { rgb: 'cccccc' } },
        left:  { style: 'thin', color: { rgb: 'cccccc' } },
        right: { style: 'thin', color: { rgb: 'cccccc' } }
      };
    });
  });

  // عرض الأعمدة
  ws['!cols'] = displayKeys.map(k => ({ wch: k === 'الصورة' ? 18 : k.length > 10 ? 22 : 16 }));
  // ارتفاع الصفوف
  ws['!rows'] = [{ hpt: 22 }, ...rows.map(() => ({ hpt: 20 }))];

  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, sheetName);
  // نستخدم bookSST: true + cellStyles: true عشان التنسيق يشتغل
  XLSX.writeFile(wb, fileName + '.xlsx', { bookSST: false, cellStyles: true });
}

// ══════════════════════════════════════════════════════════════
// buildWordTable — جدول HTML مضغوط لـ A4 landscape
// ══════════════════════════════════════════════════════════════
function buildWordTable(keys, rows, imgMap, badge) {
  const urlIdx   = keys.indexOf('رابط الصورة');
  const dispKeys = keys.map(k => k === 'رابط الصورة' ? 'الصورة' : k);
  const allDisp  = badge ? ['النوع', ...dispKeys] : dispKeys;

  // عرض ثابت للأعمدة الخاصة
  function cw(k) {
    if (k === 'الصورة') return '1.7cm';
    if (k === 'النوع')  return '1.5cm';
    if (k === 'الوصف' || k === 'مكان الاكتشاف') return '2.5cm';
    return '1.8cm';
  }

  const thead = allDisp.map(k =>
    `<th style="background:#1a6b2a;color:#fff;padding:3px 4px;border:1px solid #4caf50;font-size:8px;text-align:center;width:${cw(k)};white-space:nowrap;">${k}</th>`
  ).join('');

  const tbody = rows.map((r, ri) => {
    const bg = ri % 2 === 0 ? '#ffffff' : '#f0fff4';
    const dataCells = keys.map((k, ci) => {
      const val = r[k] || '';
      const dk  = dispKeys[ci];
      if (dk === 'الصورة') {
        if (!val) return `<td style="padding:2px;border:1px solid #ddd;text-align:center;width:1.7cm;background:${bg};color:#aaa;font-size:7px;">—</td>`;
        const b64 = imgMap[val];
        const img = b64
          ? `<img src="${b64}" width="50" height="50" style="border-radius:3px;object-fit:cover;display:block;margin:auto;">`
          : `<img src="${val}" width="50" height="50" style="border-radius:3px;object-fit:cover;display:block;margin:auto;">`;
        return `<td style="padding:2px;border:1px solid #ddd;text-align:center;width:1.7cm;background:${bg};">${img}</td>`;
      }
      return `<td style="padding:3px 4px;border:1px solid #ddd;font-size:8px;text-align:right;width:${cw(dk)};background:${bg};vertical-align:middle;word-break:break-word;">${val}</td>`;
    }).join('');

    const badgeCell = badge
      ? `<td style="padding:2px;border:1px solid #ddd;text-align:center;width:1.5cm;background:${badge.bg};font-size:7.5px;font-weight:bold;color:${badge.color};vertical-align:middle;">${badge.text}</td>`
      : '';
    return `<tr>${badgeCell}${dataCells}</tr>`;
  }).join('');

  return `<table style="border-collapse:collapse;direction:rtl;margin:0;table-layout:fixed;">
    <thead><tr>${thead}</tr></thead><tbody>${tbody}</tbody></table>`;
}

// ══════════════════════════════════════════════════════════════
// WORD — ملف واحد يحتوي الكل عند "الكل" وإلا ملف واحد
// ══════════════════════════════════════════════════════════════
async function toWord(rows, title, fileName, isCombined, missingRows, foundRows) {
  const allRows = isCombined ? [...(missingRows||[]), ...(foundRows||[])] : (rows||[]);
  if (!allRows.length) return;

  const imgMap = await preloadImages(allRows);
  let tableHTML = '';

  if (isCombined) {
    const mKeys = Object.keys(missingRows[0] || {});
    const fKeys = Object.keys(foundRows[0]  || {});
    const mBadge = { text: '🔴 مفقود',     bg: '#fff0f0', color: '#c0392b' };
    const fBadge = { text: '🟢 تم العثوره', bg: '#f0fff4', color: '#1a7a3a' };
    const mt = missingRows.length ? buildWordTable(mKeys, missingRows, imgMap, mBadge) : '';
    const ft = foundRows.length   ? buildWordTable(fKeys, foundRows,   imgMap, fBadge) : '';
    tableHTML = `
      <div style="margin-bottom:10px;">
        <div style="background:#c0392b;color:#fff;padding:5px 10px;font-size:10px;font-weight:bold;border-radius:3px 3px 0 0;">
          🔴 بلاغات الأطفال المفقودين — ${missingRows.length} بلاغ
        </div>${mt}
      </div>
      <div>
        <div style="background:#1a7a3a;color:#fff;padding:5px 10px;font-size:10px;font-weight:bold;border-radius:3px 3px 0 0;">
          🟢 بلاغات الأطفال المعثور عليهم — ${foundRows.length} بلاغ
        </div>${ft}
      </div>`;
  } else {
    tableHTML = buildWordTable(Object.keys(rows[0]), rows, imgMap, null);
  }

  const pageTitle = isCombined ? 'بلاغات الموقع الكلية' : title;
  const total     = isCombined ? `إجمالي البلاغات: ${allRows.length}` : `عدد السجلات: ${allRows.length}`;

  const html = `<html xmlns:o="urn:schemas-microsoft-com:office:office"
    xmlns:w="urn:schemas-microsoft-com:office:word"
    xmlns="http://www.w3.org/TR/REC-html40">
    <head><meta charset="UTF-8">
    <style>
      @page { size: A4 landscape; margin: 0.8cm; }
      body  { font-family:Arial,sans-serif; direction:rtl; margin:0; padding:0; }
      h2    { color:#1a6b2a; margin-bottom:3px; font-size:13px; }
      p.sub { color:#c8922a; font-size:8.5px; margin-bottom:8px; }
      table { border-collapse:collapse; }
      img   { display:block; margin:auto; }
    </style></head>
    <body>
      <h2>Child Link — ${pageTitle}</h2>
      <p class="sub">معاً نبني حياة أفضل لكل طفل &nbsp;|&nbsp; ${total} &nbsp;|&nbsp; ${new Date().toLocaleDateString('ar-EG')}</p>
      ${tableHTML}
    </body></html>`;

  const blob = new Blob(['\uFEFF' + html], { type: 'application/msword' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = fileName + '.doc';
  a.click();
  setTimeout(() => URL.revokeObjectURL(a.href), 10000);
}

// ══════════════════════════════════════════════════════════════
// buildPDFTable — جدول HTML لـ html2canvas
// ══════════════════════════════════════════════════════════════
function buildPDFTable(keys, rows, imgMap, badge) {
  const urlIdx   = keys.indexOf('رابط الصورة');
  const dispKeys = keys.map(k => k === 'رابط الصورة' ? 'الصورة' : k);
  const allDisp  = badge ? ['النوع', ...dispKeys] : dispKeys;

  const thead = allDisp.map(k => {
    const w = k === 'الصورة' ? '80px' : k === 'النوع' ? '70px' : k === 'الوصف' ? '110px' : '90px';
    return `<th style="background:#1a6b2a;color:#fff;padding:5px 6px;border:1px solid #4caf50;font-size:10px;text-align:center;width:${w};white-space:nowrap;">${k}</th>`;
  }).join('');

  const tbody = rows.map((r, ri) => {
    const bg = ri % 2 === 0 ? '#fff' : '#f0fff4';
    const dataCells = keys.map((k, ci) => {
      const val = r[k] || '';
      const dk  = dispKeys[ci];
      if (dk === 'الصورة') {
        if (!val) return `<td style="padding:3px;border:1px solid #ddd;text-align:center;background:${bg};color:#999;font-size:9px;">—</td>`;
        const b64 = imgMap[val];
        if (b64) return `<td style="padding:3px;border:1px solid #ddd;text-align:center;background:${bg};">
          <img src="${b64}" style="width:60px;height:60px;border-radius:4px;object-fit:cover;display:block;margin:auto;"></td>`;
        return `<td style="padding:3px;border:1px solid #ddd;text-align:center;background:${bg};color:#c0392b;font-size:9px;">⚠️ لم تُحمَّل</td>`;
      }
      return `<td style="padding:4px 5px;border:1px solid #ddd;font-size:10px;background:${bg};vertical-align:middle;word-break:break-word;">${val}</td>`;
    }).join('');

    const badgeCell = badge
      ? `<td style="padding:3px;border:1px solid #ddd;text-align:center;background:${badge.bg};font-size:8px;font-weight:bold;color:${badge.color};vertical-align:middle;">${badge.text}</td>`
      : '';
    return `<tr>${badgeCell}${dataCells}</tr>`;
  }).join('');

  return `<table style="border-collapse:collapse;width:100%;direction:rtl;table-layout:auto;">
    <thead><tr>${thead}</tr></thead><tbody>${tbody}</tbody></table>`;
}

// ══════════════════════════════════════════════════════════════
// PDF — صفحة واحدة عريضة أو مجمّعة مع تمييز النوعين
// ══════════════════════════════════════════════════════════════
async function toPDF(rows, title, fileName, isCombined, missingRows, foundRows) {
  const allRows = isCombined ? [...(missingRows||[]), ...(foundRows||[])] : (rows||[]);
  if (!allRows.length) return;

  const imgMap = await preloadImages(allRows);
  showStatus('⏳ جاري إنشاء ملف PDF...', 'loading');

  const wrapper = document.createElement('div');
  wrapper.style.cssText =
    'position:fixed;top:-99999px;left:-99999px;direction:rtl;' +
    'font-family:Cairo,Arial,sans-serif;background:#fff;padding:16px;width:1400px;';

  let bodyHTML = '';
  if (isCombined) {
    const mKeys = Object.keys(missingRows[0] || {});
    const fKeys = Object.keys(foundRows[0]  || {});
    const mBadge = { text: '🔴 مفقود',     bg: '#fff0f0', color: '#c0392b' };
    const fBadge = { text: '🟢 تم العثوره', bg: '#f0fff4', color: '#1a7a3a' };
    const mt = missingRows.length ? buildPDFTable(mKeys, missingRows, imgMap, mBadge) : '';
    const ft = foundRows.length   ? buildPDFTable(fKeys, foundRows,   imgMap, fBadge) : '';
    bodyHTML = `
      <div style="margin-bottom:12px;">
        <div style="background:#c0392b;color:#fff;padding:6px 12px;font-size:11px;font-weight:900;border-radius:4px 4px 0 0;">
          🔴 بلاغات الأطفال المفقودين — ${missingRows.length} بلاغ
        </div>${mt}
      </div>
      <div>
        <div style="background:#1a7a3a;color:#fff;padding:6px 12px;font-size:11px;font-weight:900;border-radius:4px 4px 0 0;">
          🟢 بلاغات الأطفال المعثور عليهم — ${foundRows.length} بلاغ
        </div>${ft}
      </div>`;
  } else {
    bodyHTML = buildPDFTable(Object.keys(rows[0]), rows, imgMap, null);
  }

  const pageTitle = isCombined ? 'بلاغات الموقع الكلية' : title;
  const total     = isCombined ? `إجمالي البلاغات: ${allRows.length}` : `عدد السجلات: ${allRows.length}`;

  wrapper.innerHTML = `
    <div style="background:#1a6b2a;color:#fff3a0;padding:12px 18px;text-align:center;border-radius:6px 6px 0 0;margin-bottom:0;">
      <div style="font-size:18px;font-weight:900;">Child Link — ${pageTitle}</div>
      <div style="font-size:10px;color:#c8e6c9;margin-top:3px;">معاً نبني حياة أفضل لكل طفل &nbsp;|&nbsp; ${total} &nbsp;|&nbsp; ${new Date().toLocaleDateString('ar-EG')}</div>
    </div>
    ${bodyHTML}`;

  document.body.appendChild(wrapper);
  await document.fonts.ready;
  await new Promise(r => setTimeout(r, 400));

  const canvas = await html2canvas(wrapper, {
    scale: 2, useCORS: true, allowTaint: true,
    backgroundColor: '#ffffff', logging: false
  });
  document.body.removeChild(wrapper);

  const { jsPDF } = window.jspdf;
  const imgData = canvas.toDataURL('image/jpeg', 0.92);
  const mmPerPx = 0.264583;
  const pageW   = Math.max(297, (canvas.width  / 2) * mmPerPx);
  const pageH   = (canvas.height / 2) * mmPerPx + 8;

  const doc = new jsPDF({
    orientation: pageW > pageH ? 'landscape' : 'portrait',
    unit: 'mm', format: [pageW, pageH]
  });
  doc.addImage(imgData, 'JPEG', 0, 4, pageW, pageH - 4);
  doc.save(fileName + '.pdf');
}

// ══════════════════════════════════════════════════════════════
// MAIN
// ══════════════════════════════════════════════════════════════
window.doExport = async function () {
  const type = window.selectedType;
  const fmt  = window.selectedFormat;
  if (!type || !fmt) return;

  disableAll(true);
  showStatus('⏳ جاري تحميل البيانات من قاعدة البيانات...', 'loading');

  try {
    if (type === 'all') {
      const [m, f] = await Promise.all([fetchCol('missing_children'), fetchCol('found_children')]);
      document.getElementById('count').textContent = `مفقودين: ${m.length} | معثور عليهم: ${f.length}`;

      if (fmt === 'excel') {
        // اكسيل: ملفين منفصلين
        toExcel(m, 'مفقودون', 'child_link_missing');
        await new Promise(r => setTimeout(r, 700));
        toExcel(f, 'معثور عليهم', 'child_link_found');
      } else if (fmt === 'word') {
        // ورد: ملف واحد مجمّع مع تمييز النوعين
        await toWord(null, null, 'child_link_all', true, m, f);
      } else {
        // PDF: ملف واحد مجمّع مع تمييز النوعين
        await toPDF(null, null, 'child_link_all', true, m, f);
      }
    } else {
      const rows = await fetchCol(type);
      document.getElementById('count').textContent = `✅ ${rows.length} سجل`;
      const isMiss = type === 'missing_children';
      const title  = isMiss ? 'الأطفال المفقودين' : 'الأطفال المعثور عليهم';
      const file   = `child_link_${type}`;

      if      (fmt === 'excel') toExcel(rows, isMiss ? 'مفقودون' : 'معثور عليهم', file);
      else if (fmt === 'word')  await toWord(rows, title, file, false);
      else                      await toPDF(rows, title, file, false);
    }

    showStatus('✅ تم التحميل بنجاح!', 'success');
  } catch (e) {
    showStatus('❌ خطأ: ' + e.message, 'error');
    console.error(e);
  }

  disableAll(false);
  document.getElementById('exportBtn').disabled = false;
};
</script>
