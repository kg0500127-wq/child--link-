* { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --gold:   #f5c842;
  --green:  #00e676;
  --green2: #69f0ae;
  --bg:     #040d06;
  --border: rgba(245,200,66,0.35);
}
body {

.card {

<!-- Canvas BG -->
<script>
const C=document.getElementById('bg'),ctx=C.getContext('2d');
let W,H;
function resize(){W=C.width=innerWidth;H=C.height=innerHeight;}
resize(); window.addEventListener('resize',resize);
const HS=34,HH=HS*Math.sqrt(3),HW=HS*2;
let hexes=[];
function buildGrid(){
  hexes=[];
  const cols=Math.ceil(W/(HW*.75))+2,rows=Math.ceil(H/HH)+2;
  for(let c=-1;c<cols;c++) for(let r=-1;r<rows;r++)
    hexes.push({x:c*HW*.75,y:r*HH+(c%2===0?0:HH/2),
      phase:Math.random()*Math.PI*2,speed:.003+Math.random()*.004,kind:Math.random()});
}
buildGrid(); window.addEventListener('resize',buildGrid);
function hexPath(x,y,s){
  ctx.beginPath();
  for(let i=0;i<6;i++){const a=Math.PI/180*(60*i-30);
    i===0?ctx.moveTo(x+s*Math.cos(a),y+s*Math.sin(a)):ctx.lineTo(x+s*Math.cos(a),y+s*Math.sin(a));}
  ctx.closePath();
}
const pts=Array.from({length:65},()=>({
  x:Math.random()*innerWidth,y:Math.random()*innerHeight,
  vx:(Math.random()-.5)*.45,vy:(Math.random()-.5)*.45,
  r:Math.random()*1.7+.4,alpha:Math.random()*.5+.15,
  col:Math.random()>.65?'#00e676':Math.random()>.5?'#f5c842':'#ffffff'
}));
let scanY=-80;
function draw(){
  ctx.clearRect(0,0,W,H);
  ctx.fillStyle='#040d06';ctx.fillRect(0,0,W,H);
  const glow=(cx,cy,r,col)=>{const g=ctx.createRadialGradient(cx,cy,0,cx,cy,r);g.addColorStop(0,col);g.addColorStop(1,'transparent');ctx.fillStyle=g;ctx.beginPath();ctx.arc(cx,cy,r,0,Math.PI*2);ctx.fill();};
  glow(W*.2,H*.3,340,'rgba(0,160,80,0.07)');
  glow(W*.8,H*.7,300,'rgba(0,100,60,0.05)');
  glow(W*.5,H*.5,180,'rgba(245,200,66,0.03)');
  const t=Date.now();
  hexes.forEach(h=>{
    const p=Math.sin(t*h.speed+h.phase);
    let a,col,sc;
    if(h.kind>.95){a=.05+p*.04;col=`rgba(245,200,66,${a})`;sc=`rgba(245,200,66,${a*1.8})`;}
    else if(h.kind>.88){a=.04+p*.04;col=`rgba(0,230,118,${a})`;sc=`rgba(0,230,118,${a*1.8})`;}
    else if(h.kind>.76){a=.02+p*.015;col=`rgba(0,180,90,${a})`;sc=`rgba(0,180,90,${a*1.5})`;}
    else{a=.008+p*.005;col=`rgba(0,120,60,${a})`;sc=`rgba(0,120,60,${a*1.2})`;}
    hexPath(h.x,h.y,HS-1.5);
    ctx.fillStyle=col;ctx.fill();
    ctx.strokeStyle=sc;ctx.lineWidth=.5;ctx.stroke();
  });
  pts.forEach(p=>{
    p.x+=p.vx;p.y+=p.vy;
    if(p.x<0)p.x=W;if(p.x>W)p.x=0;if(p.y<0)p.y=H;if(p.y>H)p.y=0;
    ctx.globalAlpha=p.alpha*(0.7+0.3*Math.sin(t*.0012+p.x));
    ctx.fillStyle=p.col;ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);ctx.fill();
  });
  ctx.globalAlpha=1;
  scanY+=.6;if(scanY>H+80)scanY=-80;
  const sg=ctx.createLinearGradient(0,scanY-45,0,scanY+45);
  sg.addColorStop(0,'rgba(0,230,118,0)');sg.addColorStop(.5,'rgba(0,230,118,0.04)');sg.addColorStop(1,'rgba(0,230,118,0)');
  ctx.fillStyle=sg;ctx.fillRect(0,scanY-45,W,90);
  ctx.strokeStyle='rgba(0,230,118,0.10)';ctx.lineWidth=1;
  ctx.beginPath();ctx.moveTo(0,scanY);ctx.lineTo(W,scanY);ctx.stroke();
  requestAnimationFrame(draw);
}
draw();
</script>

<script>
window.selectedType   = null;
window.selectedFormat = null;

window.selectType = function(btn){
  document.querySelectorAll('.type-btn').forEach(b => b.className = 'type-btn');
  window.selectedType = btn.dataset.type;
  btn.classList.add(
    window.selectedType === 'missing_children' ? 'active-missing' :
    window.selectedType === 'found_children'   ? 'active-found'   : 'active-all'
  );
  checkReady();
};

window.selectFormat = function(btn){
  document.querySelectorAll('.fmt-btn').forEach(b => b.className = 'fmt-btn');
  btn.classList.add('active');
  window.selectedFormat = btn.dataset.fmt;
  checkReady();
};

function checkReady(){
  document.getElementById('exportBtn').disabled = !(window.selectedType && window.selectedFormat);
}
</script>

function showStatus(msg, type){

function disableAll(v){
  document.querySelectorAll('.type-btn,.fmt-btn,#exportBtn').forEach(b => b.disabled = v);

function formatDate(val){
  if(!val) return '';
  if(typeof val.toDate === 'function')
    return val.toDate().toLocaleDateString('ar-EG',{year:'numeric',month:'2-digit',day:'2-digit'});
  return String(val);
}

// ══════════════════════════════════════════════════════════════
// تحميل الصورة عبر fetch → blob URL
// هذه الطريقة تتجاوز مشكلة CORS مع Firebase Storage
// لأن fetch بيطلب الـ CORS headers بشكل صريح
// ══════════════════════════════════════════════════════════════
async function imgToBase64(url) {
  if (!url) return null;
  try {
    // الطريقة الأولى: fetch مباشر (يشتغل لو Firebase Storage معمول عليه CORS صح)
    const resp = await fetch(url, { mode: 'cors' });
    if (!resp.ok) throw new Error('fetch failed');
    const blob = await resp.blob();
    return await new Promise((res, rej) => {
      const reader = new FileReader();
      reader.onload  = () => res(reader.result);
      reader.onerror = () => rej(new Error('FileReader failed'));
      reader.readAsDataURL(blob);
    });
  } catch (e1) {
    // الطريقة الثانية: Image element (fallback)
    return await new Promise(resolve => {
      const img = new Image();
      img.crossOrigin = 'anonymous';
      img.onload = () => {
        try {
          const c = document.createElement('canvas');
          c.width = img.naturalWidth; c.height = img.naturalHeight;
          c.getContext('2d').drawImage(img, 0, 0);
          resolve(c.toDataURL('image/jpeg', 0.85));
        } catch { resolve(null); }
      };
      img.onerror = () => resolve(null);
      img.src = url + (url.includes('?') ? '&' : '?') + '_cb=' + Date.now();
    });
  }
}

// ══════════════════════════════════════════════════════════════
// تحميل كل الصور مسبقاً مع progress indicator
// ══════════════════════════════════════════════════════════════
async function preloadImages(rows) {
  const map = {};
  const urlKey = 'رابط الصورة';
  const urls = [...new Set(rows.map(r => r[urlKey]).filter(Boolean))];
  if (!urls.length) return map;

  let loaded = 0;
  showStatus(`⏳ جاري تحميل الصور (0/${urls.length})...`, 'loading');

  await Promise.all(urls.map(async url => {
    map[url] = await imgToBase64(url);
    loaded++;
    showStatus(`⏳ جاري تحميل الصور (${loaded}/${urls.length})...`, 'loading');
  }));

  const success = Object.values(map).filter(Boolean).length;
  showStatus(`✅ تم تحميل ${success} من ${urls.length} صورة`, 'loading');
  return map;
}

async function fetchCol(name) {
  const snap = await getDocs(collection(db, name));
  return snap.docs.map(doc => {
    const d = doc.data();
    const createdAt = formatDate(d.created_at);
    if (name === 'missing_children')
      return {
        'المعرف': doc.id, 'الاسم': d.name||'', 'العمر': d.age||'',
        'الجنس': d.gender||'', 'لون البشرة': d.skin||'', 'المنطقة': d.area||'',
        'الحي': d.region||'', 'الوصف': d.description||'', 'ولي الأمر': d.guardian||'',
        'رقم الهاتف': d.phone||'', 'الإيميل': d.email||'', 'آخر ظهور': d.last_seen||'',
        'تاريخ الفقدان': d.lost_at||'', 'تاريخ الإبلاغ': createdAt, 'رابط الصورة': d.image_url||''
      };
    return {
      'المعرف': doc.id, 'الاسم': d.name||'', 'العمر': d.age||'',
      'الجنس': d.gender||'', 'المنطقة': d.area||'', 'الحي': d.region||'',
      'الوصف': d.description||'', 'مع من الطفل': d.child_with||'',
      'مكان الاكتشاف': d.found_location||'', 'الحالة الصحية': d.health||'',
      'رقم الهاتف': d.phone||'', 'المُبلِّغ': d.reporter||'',
      'تاريخ الاكتشاف': d.found_at||'', 'تاريخ الإبلاغ': createdAt, 'رابط الصورة': d.image_url||''
    };
  });
}

// ══════════════════════════════════════════════════════════════
// EXCEL — الرابط كنص قابل للنسخ + hyperlink
// SheetJS لا يدعم روابط Firebase بشكل موثوق بسبب CORS
// الحل: نكتب الرابط كنص مباشر في الخلية — يعمل دائماً
// ══════════════════════════════════════════════════════════════
function toExcel(rows, sheetName, fileName) {
  if (!rows.length) return;
  const keys = Object.keys(rows[0]);
  const urlIdx = keys.indexOf('رابط الصورة');

  const ws = XLSX.utils.json_to_sheet(rows.map((r, i) => {
    const copy = { ...r };
    // نحتفظ بالرابط الأصلي في الخلية كنص
    if (urlIdx >= 0) copy['رابط الصورة'] = r['رابط الصورة'] || '';
    return copy;
  }));

  // نضيف hyperlink على كل خلية رابط صورة
  if (urlIdx >= 0) {
    rows.forEach((row, i) => {
      const url = row['رابط الصورة'];
      if (url) {
        const cellAddr = XLSX.utils.encode_cell({ r: i + 1, c: urlIdx });
        if (ws[cellAddr]) {
          ws[cellAddr].l = { Target: url };
          // نجعل النص مختصراً بدل الرابط الطويل
          ws[cellAddr].v = '🖼 عرض الصورة';
        }
      }
    });
  }

  // تنسيق عرض الأعمدة
  ws['!cols'] = keys.map(k => ({ wch: k === 'رابط الصورة' ? 20 : 18 }));

  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, sheetName);
  XLSX.writeFile(wb, fileName + '.xlsx');
}

// ══════════════════════════════════════════════════════════════
// WORD — الصور مدمجة كـ base64 داخل الملف
// ══════════════════════════════════════════════════════════════
async function toWord(rows, title, fileName) {
  if (!rows.length) return;
  const keys = Object.keys(rows[0]);
  const urlIdx = keys.indexOf('رابط الصورة');
  const imgMap = await preloadImages(rows);
  const colW = Math.floor(8600 / keys.length);

  const thead = keys.map(k =>
    `<th style="background:#1a6b2a;color:#fff;padding:8px 10px;border:1px solid #4caf50;font-size:12px;text-align:right;min-width:${colW}px;">${k}</th>`
  ).join('');

  const tbody = rows.map((r, ri) =>
    `<tr style="background:${ri % 2 === 0 ? '#fff' : '#f0fff4'};">
    ${keys.map((k, ci) => {
      const val = r[k] || '';
      if (ci === urlIdx) {
        if (!val) return `<td style="padding:6px;border:1px solid #ddd;text-align:center;min-width:${colW}px;color:#999;">لا توجد صورة</td>`;
        const b64 = imgMap[val];
        if (b64) {
          // صورة مدمجة base64 — تعمل بدون إنترنت
          return `<td style="padding:5px;border:1px solid #ddd;text-align:center;min-width:${colW}px;">
            <img src="${b64}" width="120" height="120" style="border-radius:6px;object-fit:cover;display:block;margin:auto;"></td>`;
        } else {
          // رابط مباشر كبديل — Word قد يحمّله عند الفتح
          return `<td style="padding:5px;border:1px solid #ddd;text-align:center;min-width:${colW}px;">
            <img src="${val}" width="120" height="120" style="border-radius:6px;object-fit:cover;display:block;margin:auto;"
              onerror="this.style.display='none';this.nextElementSibling.style.display='block';">
            <span style="display:none;font-size:10px;color:#c0392b;">⚠️ تعذّر تحميل الصورة</span></td>`;
        }
      }
      return `<td style="padding:7px 10px;border:1px solid #ccc;text-align:right;word-break:break-word;min-width:${colW}px;">${val}</td>`;
    }).join('')}
    </tr>`
  ).join('');

  const html = `<html xmlns:o="urn:schemas-microsoft-com:office:office"
    xmlns:w="urn:schemas-microsoft-com:office:word"
    xmlns="http://www.w3.org/TR/REC-html40">
    <head><meta charset="UTF-8">
    <style>
      body{font-family:Arial,sans-serif;direction:rtl;}
      h2{color:#1a6b2a;margin-bottom:6px;}
      p.sub{color:#c8922a;font-size:11px;margin-bottom:14px;}
      table{border-collapse:collapse;width:100%;}
      img{display:block;margin:auto;}
    </style></head>
    <body>
      <h2>Child Link — ${title}</h2>
      <p class="sub">معاً نبني حياة أفضل لكل طفل &nbsp;|&nbsp; ${new Date().toLocaleDateString('ar-EG')}</p>
      <table><thead><tr>${thead}</tr></thead><tbody>${tbody}</tbody></table>
    </body></html>`;

  const blob = new Blob(['\uFEFF' + html], { type: 'application/msword' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = fileName + '.doc';
  a.click();
  setTimeout(() => URL.revokeObjectURL(a.href), 10000);
}

// ══════════════════════════════════════════════════════════════
// PDF — الصور مدمجة كـ base64 مع html2canvas
// ══════════════════════════════════════════════════════════════
async function toPDF(rows, title, fileName) {
  if (!rows.length) return;
  const keys = Object.keys(rows[0]);
  const urlIdx = keys.indexOf('رابط الصورة');
  const imgMap = await preloadImages(rows);

  showStatus('⏳ جاري إنشاء ملف PDF...', 'loading');

  const wrapper = document.createElement('div');
  wrapper.style.cssText =
    'position:fixed;top:-99999px;left:-99999px;direction:rtl;' +
    'font-family:Cairo,Arial,sans-serif;background:#fff;padding:20px;width:1300px;';

  const thead = keys.map(k =>
    `<th style="background:#1a6b2a;color:#fff;padding:8px 10px;border:1px solid #4caf50;font-size:12px;white-space:nowrap;">${k}</th>`
  ).join('');

  const tbody = rows.map((r, ri) =>
    `<tr style="background:${ri % 2 === 0 ? '#fff' : '#f0fff4'};">
    ${keys.map((k, ci) => {
      const val = r[k] || '';
      if (ci === urlIdx) {
        if (!val) return `<td style="padding:5px;border:1px solid #ddd;font-size:11px;text-align:center;color:#999;">لا توجد صورة</td>`;
        const b64 = imgMap[val];
        if (b64) {
          return `<td style="padding:4px;border:1px solid #ddd;text-align:center;">
            <img src="${b64}" style="width:100px;height:100px;border-radius:5px;object-fit:cover;display:block;margin:auto;"></td>`;
        }
        return `<td style="padding:5px;border:1px solid #ddd;font-size:10px;text-align:center;color:#c0392b;">⚠️ لم تُحمَّل الصورة</td>`;
      }
      return `<td style="padding:7px 9px;border:1px solid #ddd;font-size:11px;max-width:130px;word-break:break-word;">${val}</td>`;
    }).join('')}
    </tr>`
  ).join('');

  wrapper.innerHTML = `
    <div style="background:#1a6b2a;color:#fff3a0;padding:14px 20px;text-align:center;border-radius:8px 8px 0 0;">
      <div style="font-size:20px;font-weight:900;">Child Link — ${title}</div>
      <div style="font-size:11px;color:#c8e6c9;margin-top:4px;">معاً نبني حياة أفضل لكل طفل &nbsp;|&nbsp; ${new Date().toLocaleDateString('ar-EG')}</div>
    </div>
    <table style="border-collapse:collapse;width:100%;direction:rtl;">
      <thead><tr>${thead}</tr></thead>
      <tbody>${tbody}</tbody>
    </table>`;

  document.body.appendChild(wrapper);
  await document.fonts.ready;
  // انتظار صغير عشان الصور تتعرض في الـ DOM
  await new Promise(r => setTimeout(r, 300));

  const canvas = await html2canvas(wrapper, {
    scale: 2,
    useCORS: true,
    allowTaint: true,   // مهم: يسمح بالصور حتى لو CORS مش مفعّل
    backgroundColor: '#ffffff',
    logging: false
  });
  document.body.removeChild(wrapper);

  const { jsPDF } = window.jspdf;
  const imgData  = canvas.toDataURL('image/jpeg', 0.92);
  const canvasW  = canvas.width;
  const canvasH  = canvas.height;
  // حساب أبعاد الصفحة بالـ mm
  const mmPerPx  = 0.264583;
  const pageW    = Math.max(297, (canvasW / 2) * mmPerPx);
  const pageH    = (canvasH / 2) * mmPerPx + 10;

  const doc = new jsPDF({
    orientation: pageW > pageH ? 'landscape' : 'portrait',
    unit: 'mm',
    format: [pageW, pageH]
  });
  doc.addImage(imgData, 'JPEG', 0, 5, pageW, pageH - 5);
  doc.save(fileName + '.pdf');
}

// ══════════════════════════════════════════════════════════════
// MAIN
// ══════════════════════════════════════════════════════════════
window.doExport = async function () {
  const type = window.selectedType;
  const fmt  = window.selectedFormat;
  if (!type || !fmt) return;

  disableAll(true);
  showStatus('⏳ جاري تحميل البيانات من قاعدة البيانات...', 'loading');

  try {
    if (type === 'all') {
      const [m, f] = await Promise.all([fetchCol('missing_children'), fetchCol('found_children')]);
      document.getElementById('count').textContent = `مفقودين: ${m.length} | معثور عليهم: ${f.length}`;

      if (fmt === 'excel') {
        toExcel(m, 'مفقودون', 'child_link_missing');
        await new Promise(r => setTimeout(r, 700));
        toExcel(f, 'معثور عليهم', 'child_link_found');
      } else if (fmt === 'word') {
        await toWord(m, 'الأطفال المفقودين', 'child_link_missing');
        await new Promise(r => setTimeout(r, 1000));
        await toWord(f, 'الأطفال المعثور عليهم', 'child_link_found');
      } else {
        await toPDF(m, 'الأطفال المفقودين', 'child_link_missing');
        await new Promise(r => setTimeout(r, 1000));
        await toPDF(f, 'الأطفال المعثور عليهم', 'child_link_found');
      }
    } else {
      const rows = await fetchCol(type);
      document.getElementById('count').textContent = `✅ ${rows.length} سجل`;
      const isMiss = type === 'missing_children';
      const title  = isMiss ? 'الأطفال المفقودين' : 'الأطفال المعثور عليهم';
      const file   = `child_link_${type}`;

      if      (fmt === 'excel') toExcel(rows, isMiss ? 'مفقودون' : 'معثور عليهم', file);
      else if (fmt === 'word')  await toWord(rows, title, file);
      else                      await toPDF(rows, title, file);
    }

    showStatus('✅ تم التحميل بنجاح!', 'success');
  } catch (e) {
    showStatus('❌ خطأ: ' + e.message, 'error');
    console.error(e);
  }

  disableAll(false);
  document.getElementById('exportBtn').disabled = false;
};
</script>
